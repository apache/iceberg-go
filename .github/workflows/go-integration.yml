name: "Go Integration"

on:
  push:
    branches:
      - 'main'
  pull_request:

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    # Cache dirs pinned under the workspace; saves are gated to main below.
    env:
      GOMODCACHE: ${{ github.workspace }}/.gocache/mod
      GOCACHE: ${{ github.workspace }}/.gocache/build
    strategy:
      fail-fast: false
      matrix:
        spark:
          - { version: "3.5", setup: "integration-setup" }
          - { version: "4.0", setup: "integration-setup-spark4" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25
          # Caching managed explicitly below so saves can be gated to main.
          cache: false

      - name: Restore Go module and build cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.gocache/mod
            ${{ github.workspace }}/.gocache/build
          key: go-integration-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-integration-

      - name: Integration setup (Spark ${{ matrix.spark.version }})
        run: make ${{ matrix.spark.setup }}

      - name: Setup environment variables
        run: |
          echo "AWS_S3_ENDPOINT=http://$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' minio):9000" >> $GITHUB_ENV
          echo "SPARK_CONTAINER_ID=$(docker ps -qf 'name=spark-iceberg')" >> $GITHUB_ENV
          echo "DOCKER_API_VERSION=$(docker version -f '{{.Server.APIVersion}}')" >> $GITHUB_ENV

      - name: Run integration tests
        env:
          AWS_S3_ENDPOINT: "${{ env.AWS_S3_ENDPOINT }}"
          AWS_REGION: "us-east-1"
          SPARK_CONTAINER_ID: "${{ env.SPARK_CONTAINER_ID }}"
          DOCKER_API_VER: "${{ env.DOCKER_API_VER }}"
        run: |
          make integration-test

      - name: Show debug logs
        if: ${{ failure() }}
        run: docker compose -f internal/recipe/docker-compose.yml logs

      - name: Save Go module and build cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.gocache/mod
            ${{ github.workspace }}/.gocache/build
          key: go-integration-${{ hashFiles('go.sum') }}
